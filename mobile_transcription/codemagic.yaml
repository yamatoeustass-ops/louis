workflows:
  build:
    name: Build Flutter APK
    max_build_duration: 30
    environment:
      android_signing:
        - keystore_reference
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.android/build-cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > android/local.properties
          echo "sdk.dir=$HOME/programs/android-sdk" >> android/local.properties
      
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      
      - name: Build Android APK
        script: |
          flutter build apk --release --split-per-abi
      
      - name: Build universal APK
        script: |
          flutter build apk --release
      
      - name: Copy APK to artifacts
        script: |
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/*.apk build/artifacts/
      
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/artifacts/**
      
    publishing:
      github:
        auth: $GITHUB_TOKEN
        tag: $(BUILD_NUMBER)
        commit_message: Build APK - $(BUILD_NUMBER)
        draft: false
        prerelease: false
        files:
          - build/app/outputs/flutter-apk/*.apk
